;========== onglet PARAMETRES AVANCES
TRUSTED_AUTHORS="Auteurs de confiance"
TRUSTED_AUTHORS_DESC="Il s'agit de la liste des ID utilisateur et/ou des ID groupe utilisateurs (préfixé par 'g'), séparés par des virgules, qui sont considérés comme «auteurs de confiance». <br /> <br /> Si ce paramètre est défini, jsmallfib affiche un dossier de dépôt si l'article contenant la commande {jsmallfib} a été créé (ou modifié) par des auteurs spécifiques.<br>Cela ajoute un niveau de sécurité dans les cas où tous les auteurs ne sont pas autorisés à gérer des dépôts<br><br> Par exemple, utiliser: <br>42, g8, g10 <br>pour limiter l'affichage des dépôts uniquement si leurs articles correspondants ont été créés ou modifiés par l'utilisateur ID 42, ou par n'importe quel utilisateur des groupes ID 8 et ID 10. <br /> <br /> Laissez le champ vide pour permettre à tous les auteurs d'écrire des commandes jsmallfib."
DEFAULT_FILE_CHMOD="CHMOD Fichiers"
DEFAULT_FILE_CHMOD_DESC="Ce paramètre définit les autorisations d'accès par défaut du système de fichiers (pour les systèmes d'exploitation sur base Unix) utilisé par jsmallfib lors de la création de nouveaux fichiers. Cela n'a rien à voir avec les niveaux d'accès de jsmallfib ou Joomla! et ne devrait être modifiée que par des utilisateurs expérimentés."
DEFAULT_DIR_CHMOD="CHMOD Dossiers"
DEFAULT_DIR_CHMOD_DESC="Ce paramètre définit les autorisations d'accès par défaut du système de fichiers (pour les systèmes d'exploitation sur base Unix) utilisé par jsmallfib lors de la création de nouveaux dossiers. Cela n'a rien à voir avec les niveaux d'accès de jsmallfib ou Joomla! et ne devrait être modifiée que par des utilisateurs expérimentés."
EXTRACT_FILE="Décompressez le fichier compressé [%s] dans le dossier courant"
ABOUT_TO_EXTRACT_FILE="Vous êtes sur le point de décompresser le fichier compressé [%s] dans le dossier actuel. Êtes-vous sûr de vouloir continuer?"
HIDE_CREDITS_ICON="Cacher l'icone crédits"
HIDE_CREDITS_ICON_DESC="Ce paramètre permet de masquer la petite icône avec le lien vers le site du développeur (en bas à droite de l'explorateur de fichiers). Le survol de cette icone par la souris affiche les crédits développeur et le numéro de version du logiciel"
DEBUG_ENABLED="Activer debug"
DEBUG_ENABLED_DESC="L'activation de cette option affichera des lignes de débogage. Dans le cas d'une demande d'assistance, celles-ci pourraient aider à répondre à une question particulière"

