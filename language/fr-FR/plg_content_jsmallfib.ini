COM_PLUGINS_PERMISSIONS_OPTIONS_FIELDSET_LABEL="Niveaux d'accès"
COM_PLUGINS_DISPLAY_OPTIONS_FIELDSET_LABEL="Options d'affichage"
COM_PLUGINS_UPLOAD_OPTIONS_FIELDSET_LABEL="Téléversement (Upload)"
