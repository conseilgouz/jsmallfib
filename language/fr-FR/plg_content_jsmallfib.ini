; administrator section

PLG_JSMALLFIB_TITLE="JSmallfibPro - Simple File Browser"
PLG_JSMALLFIB_DESC="<p>Le plugin Joomla! <b>jsmallfib</b> permet de transformer un article normal de Joomla! en un explorateur de fichiers complètement fonctionnel. Les fichiers et les dossiers du dossier de base peuvent être parcourus, mais également modifiés en fonction de permissions utilisateurs et groupes.</p><p>Une fois le plugin installé et activé, tout ce que vous devez faire pour le voir en action est de créer un nouvel article (ou en modifier un existant) et d'insérer une commande spéciale (ne pas laisser d'espaces entre l'accolade ouvrante et le mot-clé <strong>jsmallfib</strong>):</p><p align='center'><strong>{jsmallfib}</strong></p><p>L'article va maintenant afficher le contenu du dossier de base, comme indiqué dans le paramètre <strong>Chemin par défaut</strong> dans la page de configuration du plugin sur l'administration du site. Si vous avez laissé la valeur par défaut après l'installation, tous les fichiers et dossiers seront stockés dans un dossier <strong>jsmallfib_top</strong> crée dans l'arborescence de votre site Joomla!. Jsmallfib créera ce dossier lors du premier accès à ce dossier de base.</p><p>Notez que <strong>les dossiers et fichiers ne seront affichés que lorsque l'article est consulté directement </strong> et non lors d'un affichage dans une liste d'articles ou en mode blog. <p>Cela vous démontre la facilité pour commencer à utiliser JSmallfib. Cependant, ce plugin a beaucoup plus de fonctionnalités. Pour avoir plus de détails sur la façon d'utiliser les fonctions en fonction des paramètres dans l'administration du plugin, vous pouvez simplement passer votre souris sur le nom de chaque paramètre pour afficher des informations pertinentes.</p><p><strong>JSmallfib a été écrit par Enrico Sandoli</strong></p>Ce programme est distribué dans l'espoir qu'il vous sera utile, mais SANS AUCUNE GARANTIE. sans même la garantie implicite de COMMERCIALISATION ou D'ADAPTATION UN USAGE PARTICULIER. Voir <a href='https://www.gnu.org/licenses/' target='_blank'>GNU General Public License </a> pour plus de détails.</p><p>Copyright&nbsp;&copy;&nbsp;2009-today&nbsp; Enrico Sandoli - mise à jour traduction par <a href='https://lomart.com' target='_blank'>LOMART</a> - maintenu par Pascal Leconte (ConseilGouz)</b></p>"

INFO_PAGE_TEXT_ORIG="<p>Le plugin Joomla! <b>jsmallfib</b> permet de transformer un article normal de Joomla! en un explorateur de fichiers complètement fonctionnel.</p><p>Ce programme est distribué sous licence <a href='https://www.gnu.org/licenses/' target='_blank'>GNU General Public License </a>.</p><p>Copyright&nbsp;&copy;&nbsp;2009-2013&nbsp; Enrico Sandoli</p>"

INFO_PAGE_TEXT="Texte affiché dans info"

