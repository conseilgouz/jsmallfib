COM_PLUGINS_LOGGING_OPTIONS_FIELDSET_LABEL="Journaux d'activités"

;========== onglet OPTIONS DEPOT
DEFAULT_PATH="&diams; Chemin par défaut"
DEFAULT_PATH_DESC="Ce paramètre optionnel est la racine du dossier contenant les fichiers. S'il est laissé vide, il sera par défaut nommé 'jsmallfib_top' dans l'arborescence de Joomla! Pas de '/' à la fin ni au début"

IS_PATH_RELATIVE="&diams; Type de chemin(relatif ou non)"
IS_PATH_RELATIVE_DESC="Indique si le chemin est relatif à l'arborescence de Joomla!, sinon c'est un chemin absolu.<br /><br /> Par exemple, si vous placez le chemin de jsmallfib <i> en dehors du dossier racine du serveur web</i> vous devez indiquer un chemin absolu."
USE_ABSOLUTE_PATH="Absolu"
USE_RELATIVE_PATH="Utilise un chemin relatif à l'arborescence de Joomla!"

DEFAULT_PATH_OVERRIDE_ENABLED="Activer la substitution de chemin par défaut"
DEFAULT_PATH_OVERRIDE_ENABLED_DESC="L'activation de ce paramètre autorise une commande jsmallfib à contenir une option dans le format <br/> <br /> <b> abspath(</b><i>chemin_absolu_vers_dossier_courant</i><b>)</b> ou <b>relpath(</b><i>chemin_relatif_vers_dossier_courant</i><b>)</b> <br/> <br/> où le chemin d'accès au dossier courant remplace le paramètre global de chemin défini par défaut dans les paramètres de l'administration. De cette façon, un dépôt à l'intérieur d'un article spécifique peut être situé indépendamment du chemin par défaut."

;========== onglet NIVEAUX D'ACCES
;--- général
MAY_NOT_ACCESS_REPOSITORY_AT_ALL="0: aucun accès"
CAN_ONLY_NAVIGATE_THE_REPOSITORY_NO_DOWNLOAD="1: Parcours des dossiers, sans téléchargement"
CAN_ONLY_NAVIGATE_THE_REPOSITORY_AND_DOWNLOAD="2: Parcours des dossiers, avec téléchargement"
MAY_CREATE_FOLDERS_AND_UPLOAD_FILES="3: Créer et renommer des dossiers, déposer et renommer des fichiers"
MAY_DELETE_FILES_BUT_NOT_FOLDERS="4: supprimer des fichiers (pas les dossiers)"
MAY_DELETE_FILES_AND_EMPTY_FOLDERS="5: supprimer les fichiers et dossiers vides"
MAY_VIEW_LOGS="6: tous les droits plus voir les logs"
;--- section 1
PERMISSION_OPTIONS_TITLE_DEFAULT="<strong>Niveaux d'accès par défaut</strong>"
DEFAULT_VISITOR_ACCESS_RIGHTS="&diams; Visiteurs"
DEFAULT_VISITOR_ACCESS_RIGHTS_DESC="Permissions par défaut pour un utilisateur non enregistré. Pour outrepasser ce paramètre utiliser USER ID 0 dans l'argument de commande de jsmallfib"
DEFAULT_REGISTERED_USER_ACCESS_RIGHTS="&diams; Utilisateurs enregistrés"
DEFAULT_REGISTERED_USER_ACCESS_RIGHTS_DESC="Permissions par défaut pour un utilisateur enregistré<br /><br />OPTION EQUIVALENTE LIGNE DE COMMANDE:<br> reg:x [où x est le niveau d'accès]"
;--- section 2 - USERBOUND
PERMISSION_OPTIONS_TITLE_USERBOUND="<strong>Niveaux d'accès dépôt utilisateur (Userbound)</strong>"
USERBOUND_PREFIX="&diams; Préfixe"
USERBOUND_PREFIX_DESC="Lorsque la commande jsmallfib comprend un argument [USERBOUND], il utilisera un nom du dossier composé de 3 parties: un texte préfixe, un paramètre dépendant de l'utilisateur (ID ou nom utilisateur) et un texte suffixe <br /><br /><b>Ce paramètre spécifie le texte préfixe</b> (Ce champ <b>ne peut pas être vide</b> mais vous pouvez le désactiver avec le paramètre ci-après)<br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers personnels existants, mais les  nouveaux devraient être créés avec la nouvelle dénomination</b>"
USERBOUND_PREFIX_USE="Utiliser un préfixe"
USERBOUND_PREFIX_USE_DESC="Ce paramètre désactive l'utilisation du préfixe ci-dessus (il est nécessaire puisque la chaîne de préfixe ne peut pas être vide)<br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers personnels existants, mais les  nouveaux devraient être créés avec la nouvelle dénomination</b>"
USERBOUND_PARAMETER="&diams; Identifiant dossier"
USERBOUND_PARAMETER_DESC="Lorsque la commande jsmallfib comprend un argument [USERBOUND], il utilisera un nom du dossier composé de 3 parties: un texte préfixe, un paramètre dépendant de l'utilisateur (ID ou nom utilisateur) et un texte suffixe.<br /><br /><b>Ce paramètre spécifie le paramètre dépendant de l'utilisateur</b><br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers personnels existants, mais les  nouveaux devraient être créés avec la nouvelle dénomination</b>"
USER_ID="ID utilisateur"
USER_ID_USERNAME="ID utilisateur et Username"
USER_NAME="Nom utilisateur"
USER_USERNAME="Username (utilisé pour la connexion)"
USERBOUND_SUFFIX="Suffixe"
USERBOUND_SUFFIX_DESC="Lorsque la commande jsmallfib comprend un argument [USERBOUND], il utilisera un nom du dossier composé de 3 parties: un texte préfixe, un paramètre dépendant de l'utilisateur (ID ou nom utilisateur) et un texte suffixe.<br /><br /><b>Ce paramètre spécifie le texte suffixe</b> (il peut être vide)<br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers personnels existants, mais les  nouveaux devraient être créés avec la nouvelle dénomination</b>"
DEFAULT_PERSONAL_ACCESS_RIGHTS="Droit d'accès par défaut"
DEFAULT_PERSONAL_ACCESS_RIGHTS_DESC="Les autorisations par défaut dans un espace personnel. Lorsque le nom du dossier est 'USERBOUND', il est remplacé par un espace personnel, spécifique pour chaque utilisateur. Ceci permet à jsmallfib d'afficher un répertoire différent pour chaque utilisateur avec le même article."

;--- section 3 - GROUPBOUND
PERMISSION_OPTIONS_TITLE_GROUPBOUND="<strong>Niveaux d'accès au dossier du groupe utilisateurs (Groupbound)</strong>"
GROUPBOUND_PREFIX="&diams; Préfixe"
GROUPBOUND_PREFIX_DESC="Lorsque la commande jsmallfib comprend un argument [GROUPBOUND], il utilisera un nom du dossier composé de 3 parties: un texte préfixe, un paramètre dépendant du groupe d'utilisateur (ID ou nom du groupe) et un texte suffixe.<br /><br /><b>Ce paramètre spécifie le texte préfixe</b> (Ce champ <b>ne peut pas être vide</b> mais vous pouvez le désactiver avec le paramètre ci-après)<br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers partagés existants, mais les nouveaux devraient être créés avec la nouvelle dénomination</b>"
GROUPBOUND_PREFIX_USE="Utiliser un préfixe"
GROUPBOUND_PREFIX_USE_DESC="Ce paramètre désactive l'utilisation du préfixe ci-dessus (il est nécessaire puisque la chaîne de préfixe ne peut pas être vide)<br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers partagés existants, mais les nouveaux devraient être créés avec la nouvelle dénomination</b>"
GROUPBOUND_PARAMETER="&diams; Identifiant dossier groupe utilisateur"
GROUPBOUND_PARAMETER_DESC="Lorsque la commande jsmallfib comprend un argument [GROUPBOUND], il utilisera un nom du dossier composé de 3 parties: un texte préfixe, un paramètre dépendant du groupe d'utilisateur (ID ou nom du groupe) et un texte suffixe.<br /><br /><b>Ce paramètre spécifie le paramètre dépendant du groupe utilisateur</b><br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers partagés existants, mais les nouveaux devraient être créés avec la nouvelle dénomination</b>"
GROUP_ID="ID du groupe utilisateur"
GROUP_TITLE="Nom du du groupe utilisateur"
GROUPBOUND_SUFFIX="Suffixe"
GROUPBOUND_SUFFIX_DESC="Lorsque la commande jsmallfib comprend un argument [GROUPBOUND], il utilisera un nom du dossier composé de 3 parties: un texte préfixe, un paramètre dépendant du groupe d'utilisateur (ID ou nom du groupe) et un texte suffixe.<br /><br /><b>Ce paramètre spécifie le texte suffixe</b> (il peut être vide)<br /><br /><b>IMPORTANT : la modification de ce paramètre ne renommera pas les dossiers partagés existants, mais les nouveaux devraient être créés avec la nouvelle dénomination</b>"
DEFAULT_GROUP_ACCESS_RIGHTS="Droit d'accès par défaut"
DEFAULT_GROUP_ACCESS_RIGHTS_DESC="Les autorisations par défaut pour le dossier partagé d'un groupe. Lorsque la commande jsmallfib comprend un argument [GROUPBOUND], il utilisera un dossier partagé entre les membres d'un même groupe d'utilisateurs Joomla. Cela permet à jsmallfib d'afficher un répertoire distinct pour chaque groupe à partir d'un même article."
PICK_USERGROUP_LOWEST_RIGHTS="Droit d'accès par défaut"
PICK_USERGROUP_LOWEST_RIGHTS_DESC="Lorsque les permissions sont spécifiées comme options pour les groupes d'utilisateurs, et qu'un utilisateur appartient à plus d'un groupe, ces paramètres indiquent à jsmallfib s'il doit utiliser la plus restrictive ou la plus permissive, dans le cas où plusieurs autorisations UserGroup sont précisées dans le même commande."

;--- section 4 - AUTRES
PERMISSION_OPTIONS_TITLE_OTHER="<strong>Autres permissions</strong>"
UNZIP_ALLOW="Autoriser unzip"
UNZIP_ALLOW_DESC="Ce paramètre permet d'activer ou de désactiver la possibilité d'extraire des fichiers compressés dans le dossier actuel. Les extensions reconnues pour les fichiers compressés sont <b>bz2</b>, <b>bzip2</b>, <b>gz</b>, <b>gzip</b>, <b>tar</b>, <b>tbz2</b>, <b>tgz</b> and <b>zip</b><br /><br />COMMANDE EQUIVALENTE: unzip:x [où x est 1 pour activé, 0 pour désactivé]"
ALLOW_FILE_ARCHIVING="Autoriser archivage fichier"
ALLOW_FILE_ARCHIVING_DESC="Ce paramètre permet d'archiver la copie courante d'un fichier lors du téléchargement d'une nouvelle version"
FILTER_LIST_ALLOW="Autoriser le filtrage"
FILTER_LIST_ALLOW_DESC="Définir ce paramètre affichera une boîte de saisie en haut à droite de l'explorateur de fichiers. Vous pouvez ensuite filtrer la liste des fichiers en fonction de modèles de nom de fichier. Vous pouvez utiliser plus d'un modèle en utilisant une liste de fichiers séparés par des points-virgules, comme:<br /><b>.jpg; .pdf; .doc</b>"

;========== onglet AFFICHAGE
;--- section
DISPLAY_OPTIONS_TITLE_GENERAL="<strong>Options générales d'affichage</strong>"
HIDDEN_FILES="Fichiers cachés"
HIDDEN_FILES_DESC="Liste des fichiers cachés séparés par une virgule (supporte le format *.ext pour cacher tous les fichiers avec l'extension .ext)"
HIDDEN_FOLDERS="Dossiers cachés"
HIDDEN_FOLDERS_DESC="Liste des dossiers cachés séparés par une virgule"
ENCODE_TO_UTF8="&diams; Conversion UTF-8"
ENCODE_TO_UTF8_DESC="Vous pouvez modifier le réglage par défaut de ce paramètre si vous avez des problèmes d'affichage avec des caractères spéciaux dans les noms de fichiers, comme lors de l'affichage des caractères accentués<br><br>NdT: Utiliser la valeur <b>Non</b> pour la France."
IS_DIRECT_LINK_TO_FILES="Méthode liaison fichiers"
IS_DIRECT_LINK_TO_FILES_DESC="Ce paramètre vous permet de choisir comment lier les fichiers. La méthode par défaut de jsmallfib affiche une boîte de dialogue avec la possibilité d'ouvrir ou de télécharger le fichier. <b> Cette option est recommandée car elle permet d'identifier correctement les téléchargements demandés</b>. Avec les autres options en cliquant sur un fichier, il s'ouvre directement dans la même fenêtre ou une nouvelle.<br /> <br /> <b> Avec les deux dernières options jsmallfib ne sera pas en mesure de journaler les téléchargements. Également, si l'emplacement est en dehors de la racine du dossier racine, la boîte va être utilisé indépendamment de cette configuration</b>"
DIRECT_LINK_TO_FILES_NEW_WINDOW="Ouvrir directement lors clic souris(nouvelle fenêtre)"
DIRECT_LINK_TO_FILES_NO="Dialogue Ouvrir/Télécharger (recommandé)"
DIRECT_LINK_TO_FILES_SAME_WINDOW="Ouvrir directement lors clic souris(même fenêtre)"

DISPLAY_CURRENTDIRECTORY="Afficher navigation"
DISPLAY_CURRENTDIRECTORY_DESC="Ce paramètre définit si le dossier en cours, ainsi que les liens de navigation sur le côté supérieur gauche de l'explorateur de fichiers, doit être affiché"
SHOW_HELP_LINK="Afficher le lien vers l'info"
SHOW_HELP_LINK_DESC="Ce paramètre sur 'oui' affiche un lien vers l'info en haut à droite du bloc de l'explorateur de fichiers. Ce texte est modifiable dans le fichier langage '/plugins/content/jsmallfib/fr-FR.plj_content_jsmallfib.ini' mot-clé: INFO_PAGE_TEXT"
ALLOW_UPLOAD_BOX_HIDING="Autoriser masquage boite actions"
ALLOW_UPLOAD_BOX_HIDING_DESC="Avec ce paramètre activé, l'utilisateur est autorisé à fermer la nouvelle boîte de chargement de dossier/fichier, sinon cette boîte sera toujours visible (pour les utilisateurs ayant des autorisations nécessaires)"
THUMBSIZE="Taille des vignettes"
THUMBSIZE_DESC="Ceci est la taille des vignettes affichées à la place des icône d'extension de fichiers. Une valeur de '0' signifie 'Pas de vignette'.<br /><br />OPTION EQUIVALENTE LIGNE COMMANDE: thumbsize:x [où x est la taille en pixels]<br /><br />NOTE: Une version de la bibliothèque GD >= 1.8 doit être installée, sinon les vignettes ne seront pas générées par jsmallfib"

;--- section
DISPLAY_OPTIONS_TITLE_SIZE_AND_DATE="<strong>Options date/heure et taille des fichiers</strong>"
DISPLAY_FILESIZE="Afficher taille"
DISPLAY_FILESIZE_DESC="Ce paramètre définit si la taille de chaque fichier est affiché"
FILESIZE_SEPARATOR="Séparateur pour taille fichier"
FILESIZE_SEPARATOR_DESC="Ceci est le séparateur (point ou virgule) qui est utilisé pour l'affichage des tailles de fichiers"
DOT="point"
COMMA="virgule"
DISPLAY_FILEDATE="Afficher date"
DISPLAY_FILEDATE_DESC="Ce paramètre définit si la date de dernière modification de chaque fichier est affiché"
DATE_FORMAT="Format affichage date"
DATE_FORMAT_DESC="Ce paramètre définit le format par défaut pour les fichiers"
DISPLAY_FILETIME="Afficher heure"
DISPLAY_FILETIME_DESC="Ce paramètre définit si l'heure de dernière modification de chaque fichier est affiché"
DISPLAY_SECONDS="Afficher les secondes"
DISPLAY_SECONDS_DESC="Ce paramètre définit si les secondes sont affichées dans l'heure du fichier"

;--- section
DISPLAY_OPTIONS_TITLE_SORTING="<strong>Options de tri</strong>"
DEFAULT_SORT_BY="Tri par défaut des éléments "
DEFAULT_SORT_BY_DESC="Ce paramètre définit quel élément (nom de fichier ou dossier, taille du fichier ou date de dernière modification) est utilisé comme critère de tri<br><br>OPTION EQUIVALENTE LIGNE DE COMMANDE:<br>sortby:x [où x est 1 pour Nom, 2 pour Taille, 3 pour date]"
NAME="Nom"
SIZE="Taille"
CHANGED="Date modification"

DEFAULT_SORT_AS="Ordre de tri par défaut"
DEFAULT_SORT_AS_DESC="Ce paramètre définit l'ordre de tri par défaut des fichiers et des dossiers<br /><br />COMMANDE EQUIVALENTE: sortas:x [où x est 1 pour croissant et 2 pour décroissant]"
DESCENDING="Décroissant"
ASCENDING="Croissant"

SET_DESCENDING_ORDER="Ordre décroissant"
SET_ASCENDING_ORDER="Ordre croissant"

DEFAULT_SORT_NAT="Ordre de tri naturel"
DEFAULT_SORT_NAT_DESC="Ce paramètre permet de trier les chaînes alphanumériques des noms de fichiers et de dossiers de la même façon qu'un être humain le ferait. À titre d'exemple, le tri avec cette méthode, appelée «ordre naturel», affiche les fichiers suivants:<br /><br />img1.png<br />img2.png<br />img10.png<br /><br />alors que la méthode normale, les afficherait<br /><br />img1.png<br />img10.png<br />img2.png<br />"

;========== onglet TELEVERSEMENT-UPLOAD
UPLOAD_TYPE="&diams; Méthode envoi fichiers"
UPLOAD_TYPE_DESC="Vous pouvez sélectionner un formulaire HTML standard ou un transfert basé sur du Flash. Le tableau suivant présente les principales différences entre les deux méthodes:<br><table cellspacing='0' cellpadding='0' border='1'><tr align='center'><td>&nbsp;</td><td><b>HTML upload</b></td><td><b>Flash upload</b></td></tr><tr><td>Envoi de plusieurs fichiers</td><td align='center'>Non</td><td align='center'>Oui (voir paramètres correspondants)</td></tr><tr><td>Filtre fichiers par type</td><td align='center'>Non</td><td align='center'>Oui (voir paramètres correspondants)</td></tr></tr><tr><td>Limite de la taille fichiers</td><td align='center'>Non</td><td align='center'>Oui</td></tr><tr><td>Barre de progression</td><td align='center'>Non</td><td align='center'>Oui</td></tr></tr><tr><td>Annuler un transfert en cours</td><td align='center'>Non</td><td align='center'>Oui</td></tr><tr><td>Compatibilité</td><td align='center'>Tout navigateurs</td><td align='center'>Nécessite flash et Javascript, non compatible avec tous les navigateurs ou systèmes d'exploitation</td></tr></table><p>La méthode flash est basé sur les bibliothèques javascript SWFUpload, qui sont distribuées sous une licence MIT par http://www.swfupload.org</p><p style='color:red'>Pour compatibilité HTML5, éviter d'utiliser l'upload FLASH</p>"
HTMLUPLOAD="HTML upload"
SWFUPLOAD="Flash upload"
SWFUPLOAD_FILE_SIZE_LIMIT_NUMBER="&otimes; Taille maxi fichier"
SWFUPLOAD_FILE_SIZE_LIMIT_NUMBER_DESC="(UNIQUEMENT POUR FLASH UPLOAD) Taille maxi fichier sans espace, point ou virgule. Une valeur de '0' veut dire 'Pas de restrictions'"
SWFUPLOAD_FILE_SIZE_LIMIT_UNIT="&otimes; Unité pour Taille maxi fichier"
SWFUPLOAD_FILE_SIZE_LIMIT_UNIT_DESC="(UNIQUEMENT POUR FLASH UPLOAD) Unité pour la taille maxi fichier indiquée au-dessus"
SWFUPLOAD_BUTTON_ACTION="&otimes; Chargement fichiers"
SWFUPLOAD_BUTTON_ACTION_DESC="(UNIQUEMENT POUR FLASH UPLOAD) Ce paramètre détermine si le mode multi-fichiers est autorisé"
UPLOAD_SINGLE_FILE="Un fichier à la fois"
UPLOAD_MULTIPLE_FILES="Plusieurs fichiers à la fois"
SWFUPLOAD_RESOLVE_CONFLICTS="Fichier existe déjà"
SWFUPLOAD_RESOLVE_CONFLICTS_DESC="Ce paramètre définit l'action par défaut, lors du chargement de plusieurs fichiers à la fois, si un fichier existe déjà dans le dossier cible."
SWFUPLOAD_RESOLVE_CONFLICT_OPTION_ASK="Me demander quoi faire"
SWFUPLOAD_RESOLVE_CONFLICT_OPTION_CANCEL="Ne pas le modifier"
SWFUPLOAD_RESOLVE_CONFLICT_OPTION_OVERRIDE="Ecraser le fichier existant"
SWFUPLOAD_RESOLVE_CONFLICT_OPTION_ARCHIVE="Le mettre en archive"
SWFUPLOAD_FILE_UPLOAD_LIMIT="&otimes; Max fichiers en upload"
SWFUPLOAD_FILE_UPLOAD_LIMIT_DESC="(UNIQUEMENT POUR FLASH UPLOAD) Le nombre maximum de fichiers autorisés à être mis en attente pour le chargement. Ne pas mettre d'espace, de point ou virgule. Une valeur de '0' veut dire 'Pas de restrictions'"
SWFUPLOAD_FILE_TYPES="&otimes; Type de fichiers"
SWFUPLOAD_FILE_TYPES_DESC="(UNIQUEMENT POUR FLASH UPLOAD) Il s'agit d'une liste de types de fichiers, séparés par des  points-virgules, autorisés en chargement. Example: <b>*.jpg;*.png;*.gif</b>. Une valeur de <b>*.*</b> veut dire 'Pas de restrictions'"
SWFUPLOAD_FILE_TYPES_DESCRIPTION="&otimes; Description type fichiers"
SWFUPLOAD_FILE_TYPES_DESCRIPTION_DESC="(UNIQUEMENT POUR FLASH UPLOAD) Une description texte pour les types de fichiers autorisés à être charger. par exemple: <b>Images</b> ou <b>Videos</b>"

;========== onglet STYLE MISE EN FORME
;---- section
LOOKANDFEEL_OPTIONS_TITLE_GENERAL="<strong>Options principales (appliquées à tous les blocs)</strong>"
MAIN_DISPLAY_WIDTH="&diams; Largeur bloc principal"
MAIN_DISPLAY_WIDTH_DESC="Largeur de l'affichage principal (en pixels, pas de 'px')<br /><br />OPTION EQUIVALENTE LIGNE DE COMMANDE:<br> width:x [où x est la largeur désirée en pixels - sans 'px' à la fin]<hr>NdT: Pour avoir un comportement responsive, il est souhaitable d'indiquer '<b>width:100%</b>'."
BOX_DISTANCE="Box distance"
BOX_DISTANCE_DESC="La distance verticale, en pixels, entre les différentes boîtes de jsmallfib(liste fichiers, fichiers archive, boîte upload)"
JS_ICONSET="Set d'icônes"
JS_ICONSET_DESC="Avec ce paramètre, vous pouvez définir le set d'icônes à utiliser par  jsmallfib. Les sets d'icônes sont stockés dans des dossiers séparés dans le dossier '/plugins/content/jsmallfib/media"
JS_ICONSET_ORIGINAL="Original (Taille fixe)"
JS_ICONSET_SMALLERIK="Smallerik"
BORDER_RADIUS="Arrondi bordure"
BORDER_RADIUS_DESC="Réglez ce paramètre sur 0 (zéro) si vous voulez des cadres aux angles carrés, sinon définir le rayon voulu pour une boîte avec des coins arrondis"
USE_BOX_SHADOW="Ombrage boîte"
